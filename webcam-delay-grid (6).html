<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELAY GRID</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --panel: #111;
    --accent: #00ff9d;
    --accent2: #ff2d55;
    --text: #e0e0e0;
    --mono: 'Share Tech Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    cursor: crosshair;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    border-bottom: 1px solid #1e1e1e;
    background: var(--panel);
    flex-shrink: 0;
    z-index: 10;
    gap: 8px;
  }

  .title {
    font-family: 'Bebas Neue', cursive;
    font-size: 26px;
    letter-spacing: 6px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,157,0.4);
  }

  .subtitle {
    font-size: 9px;
    color: #444;
    letter-spacing: 3px;
    margin-top: 1px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .divider {
    width: 1px;
    height: 34px;
    background: #222;
    flex-shrink: 0;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .control-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: #aaa;
    text-transform: uppercase;
    font-weight: 600;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100px;
    height: 3px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,255,157,0.6);
  }

  .value-display {
    font-size: 12px;
    color: var(--accent);
    min-width: 40px;
    text-align: right;
  }

  .btn {
    background: transparent;
    border: 1px solid #333;
    color: var(--text);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,157,0.05);
  }

  .btn.danger:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,45,85,0.05);
  }

  .btn.active-danger {
    border-color: var(--accent2) !important;
    color: var(--accent2) !important;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #333;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .status-dot.live {
    background: var(--accent2);
    box-shadow: 0 0 8px rgba(255,45,85,0.8);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #canvas-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050505;
  }

  #grid-canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  #overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px
    );
  }

  /* Start screen */
  #start-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(10,10,10,0.97);
    z-index: 20;
  }

  .start-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 60px;
    letter-spacing: 12px;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(0,255,157,0.3);
  }

  .start-sub {
    font-size: 10px;
    color: #444;
    letter-spacing: 4px;
    margin-bottom: 16px;
  }

  .start-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Bebas Neue', cursive;
    font-size: 20px;
    letter-spacing: 6px;
    padding: 12px 36px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,255,157,0.1);
  }

  .start-btn:hover { background: rgba(0,255,157,0.1); box-shadow: 0 0 40px rgba(0,255,157,0.25); }
  .start-btn:disabled { opacity: 0.5; cursor: default; }

  /* Warmup overlay */
  #warmup-screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: rgba(10,10,10,0.82);
    z-index: 15;
    pointer-events: none;
  }

  #warmup-screen.visible { display: flex; }

  .warmup-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: #666;
    text-transform: uppercase;
  }

  .warmup-count {
    font-family: 'Bebas Neue', cursive;
    font-size: 96px;
    letter-spacing: 8px;
    color: var(--accent);
    text-shadow: 0 0 60px rgba(0,255,157,0.4);
    line-height: 1;
  }

  .warmup-bar-track {
    width: 240px;
    height: 2px;
    background: #1a1a1a;
    border-radius: 2px;
  }

  .warmup-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
    box-shadow: 0 0 8px rgba(0,255,157,0.5);
  }

  .warmup-sub {
    font-size: 9px;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="title">DELAY GRID</div>
    <div class="subtitle">temporal displacement visualizer</div>
  </div>

  <div class="controls">

    <div style="display:flex;flex-direction:column;gap:5px">
      <button class="btn" id="rainbowBtn">TINT ○</button>
      <button class="btn" id="clearBtn">CLEAR</button>
      <button class="btn danger" id="freezeBtn">FREEZE</button>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <div class="control-label">Columns</div>
      <div class="control-row">
        <input type="range" id="colsSlider" min="4" max="160" value="160" step="1">
        <span class="value-display" id="colsVal">160</span>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">Rows</div>
      <div class="control-row">
        <input type="range" id="rowsSlider" min="4" max="120" value="120" step="1">
        <span class="value-display" id="rowsVal">120</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <div class="control-label">Max Delay</div>
      <div class="control-row">
        <input type="range" id="maxDelay" min="100" max="10000" value="3000" step="100">
        <span class="value-display" id="delayVal">3.0s</span>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">Decay Speed</div>
      <div class="control-row">
        <input type="range" id="decaySpeed" min="2" max="6" value="4" step="0.1">
        <span class="value-display" id="decayVal">4.0s</span>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">Brush Size</div>
      <div class="control-row">
        <input type="range" id="brushSize" min="1" max="50" value="50" step="1">
        <span class="value-display" id="brushVal">50</span>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">Falloff Curve</div>
      <div class="control-row">
        <input type="range" id="falloffSlider" min="0.1" max="4" value="4" step="0.05">
        <span class="value-display" id="falloffVal">sharp</span>
      </div>
    </div>

    <div class="divider"></div>

    <div style="display:flex;align-items:center;gap:8px">
      <div class="status-dot" id="statusDot"></div>
      <span style="font-size:9px;color:#444;letter-spacing:2px" id="statusText">OFFLINE</span>
    </div>

  </div>
</header>

<div id="canvas-container">
  <canvas id="grid-canvas"></canvas>
  <div id="overlay"></div>

  <!-- Warmup countdown (shows after camera starts, before buffer is ready) -->
  <div id="warmup-screen">
    <div class="warmup-label">buffering — please wait</div>
    <div class="warmup-count" id="warmupCount">3</div>
    <div class="warmup-bar-track">
      <div class="warmup-bar-fill" id="warmupBar"></div>
    </div>
    <div class="warmup-sub">move your mouse after countdown</div>
  </div>

  <!-- Start screen -->
  <div id="start-screen">
    <div class="start-title">DELAY GRID</div>
    <div class="start-sub">sweep across squares to freeze time</div>
    <button class="start-btn" id="startBtn">ENABLE CAMERA</button>
  </div>
</div>

<video id="video" autoplay playsinline style="display:none"></video>

<script>
// ── Grid state ────────────────────────────────────────────────────────────────
let COLS = 160;
let ROWS = 120;

// ── Frame buffer ──────────────────────────────────────────────────────────────
const BUFFER_MS   = 12000;
const FPS         = 30;
const FRAME_MS    = 1000 / FPS;
const MAX_FRAMES  = Math.ceil(BUFFER_MS / FRAME_MS);

let frameBuffer   = [];
let frameHead     = 0;
let frameCount    = 0;
let lastCapture   = 0;
let lastDecayTime = performance.now();
let cameraStartTime = 0;  // when camera went live

// ── UI state ──────────────────────────────────────────────────────────────────
let cellDelay  = new Float32Array(COLS * ROWS);
let maxDelay   = 3000;
let decaySpeed = 4;
let brushSize  = 50;
let falloffExp = 4;
let rainbowOn  = false;
let frozen     = false;
let running    = false;
let warmupDone = false;
let mouseX     = -1, mouseY = -1;

// ── Canvas refs ───────────────────────────────────────────────────────────────
const canvas    = document.getElementById('grid-canvas');
const ctx       = canvas.getContext('2d');
const container = document.getElementById('canvas-container');
const video     = document.getElementById('video');

let capCanvas = document.createElement('canvas');
let capCtx    = capCanvas.getContext('2d');
let cellCvs   = document.createElement('canvas');
let cellCtx   = cellCvs.getContext('2d');
let outData   = null;

// ── Slider fill helper ────────────────────────────────────────────────────────
function fillSlider(s) {
  const pct = ((+s.value - +s.min) / (+s.max - +s.min) * 100).toFixed(1) + '%';
  s.style.background = `linear-gradient(to right, var(--accent) ${pct}, #1e1e1e ${pct})`;
}

function bindSlider(id, onVal, dispId, fmt) {
  const s = document.getElementById(id);
  const d = document.getElementById(dispId);
  s.addEventListener('input', () => {
    onVal(+s.value);
    d.textContent = fmt(+s.value);
    fillSlider(s);
  });
  fillSlider(s);
  d.textContent = fmt(+s.value);
}

// ── Grid resize ───────────────────────────────────────────────────────────────
function rebuildGrid() {
  cellDelay   = new Float32Array(COLS * ROWS);
  frameBuffer = [];
  frameHead   = 0;
  frameCount  = 0;
  warmupDone  = false;
  if (running) startWarmup();

  capCanvas.width  = COLS;
  capCanvas.height = ROWS;
  capCtx = capCanvas.getContext('2d');

  cellCvs.width  = COLS;
  cellCvs.height = ROWS;
  cellCtx = cellCvs.getContext('2d');
  outData = cellCtx.createImageData(COLS, ROWS);

  fitCanvas();
}

// ── Fit display canvas so cells are perfect squares ───────────────────────────
function fitCanvas() {
  const aw = container.clientWidth;
  const ah = container.clientHeight;
  const cs = Math.max(1, Math.min(Math.floor(aw / COLS), Math.floor(ah / ROWS)));
  canvas.width  = cs * COLS;
  canvas.height = cs * ROWS;
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
}

window.addEventListener('resize', fitCanvas);

// ── Wire controls ─────────────────────────────────────────────────────────────
const colsSlider = document.getElementById('colsSlider');
const rowsSlider = document.getElementById('rowsSlider');
const colsVal    = document.getElementById('colsVal');
const rowsVal    = document.getElementById('rowsVal');

colsSlider.addEventListener('input', () => {
  COLS = +colsSlider.value;
  colsVal.textContent = COLS;
  fillSlider(colsSlider);
  rebuildGrid();
});
rowsSlider.addEventListener('input', () => {
  ROWS = +rowsSlider.value;
  rowsVal.textContent = ROWS;
  fillSlider(rowsSlider);
  rebuildGrid();
});
fillSlider(colsSlider);
fillSlider(rowsSlider);

bindSlider('maxDelay',   v => { maxDelay = v; }, 'delayVal', v => (v/1000).toFixed(1)+'s');
bindSlider('decaySpeed', v => decaySpeed = v, 'decayVal', v => v.toFixed(1)+'s');
bindSlider('brushSize',  v => brushSize  = v, 'brushVal', v => v);
document.getElementById('brushVal').textContent = brushSize;

const falloffSlider = document.getElementById('falloffSlider');
const falloffVal    = document.getElementById('falloffVal');
function falloffLabel(v) {
  if (v < 0.4) return 'soft';
  if (v < 0.8) return 'wide';
  if (v < 1.3) return 'norm';
  if (v < 2.2) return 'hard';
  return 'sharp';
}
falloffSlider.addEventListener('input', () => {
  falloffExp = +falloffSlider.value;
  falloffVal.textContent = falloffLabel(falloffExp);
  fillSlider(falloffSlider);
});
fillSlider(falloffSlider);
falloffVal.textContent = falloffLabel(falloffExp);

// Tint toggle
const rainbowBtn = document.getElementById('rainbowBtn');
rainbowBtn.addEventListener('click', () => {
  rainbowOn = !rainbowOn;
  rainbowBtn.textContent       = rainbowOn ? 'TINT ●' : 'TINT ○';
  rainbowBtn.style.borderColor = rainbowOn ? 'var(--accent)' : '';
  rainbowBtn.style.color       = rainbowOn ? 'var(--accent)' : '';
});

document.getElementById('clearBtn').addEventListener('click', () => cellDelay.fill(0));

const freezeBtn = document.getElementById('freezeBtn');
freezeBtn.addEventListener('click', () => {
  frozen = !frozen;
  freezeBtn.textContent = frozen ? 'UNFREEZE' : 'FREEZE';
  freezeBtn.classList.toggle('active-danger', frozen);
});

// ── Warmup countdown ──────────────────────────────────────────────────────────
const warmupScreen = document.getElementById('warmup-screen');
const warmupCount  = document.getElementById('warmupCount');
const warmupBar    = document.getElementById('warmupBar');

function startWarmup() {
  warmupDone = false;
  warmupScreen.classList.add('visible');
  cameraStartTime = performance.now();
}

function tickWarmup(now) {
  // Warmup duration = maxDelay so the buffer has enough history
  const warmupMs = maxDelay;
  const elapsed  = now - cameraStartTime;
  const progress = Math.min(elapsed / warmupMs, 1);
  const remaining = Math.max(0, Math.ceil((warmupMs - elapsed) / 1000));

  warmupBar.style.width = (progress * 100).toFixed(1) + '%';
  warmupCount.textContent = remaining > 0 ? remaining : '✓';

  if (progress >= 1 && !warmupDone) {
    warmupDone = true;
    warmupScreen.classList.remove('visible');
  }
}

// ── Mouse — blocked during warmup ────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = Math.floor((e.clientX - r.left) / r.width  * COLS);
  mouseY = Math.floor((e.clientY - r.top)  / r.height * ROWS);
  if (warmupDone) applyBrush(mouseX, mouseY);
});
canvas.addEventListener('mouseleave', () => { mouseX = -1; mouseY = -1; });

function applyBrush(cx, cy) {
  const r = brushSize - 1;
  if (r === 0) {
    if (cx >= 0 && cx < COLS && cy >= 0 && cy < ROWS)
      cellDelay[cy * COLS + cx] = maxDelay;
    return;
  }
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      const x = cx + dx, y = cy + dy;
      if (x < 0 || x >= COLS || y < 0 || y >= ROWS) continue;
      const dist = Math.sqrt(dx*dx + dy*dy) / r;
      if (dist > 1) continue;
      const strength = Math.pow(Math.cos(dist * Math.PI * 0.5), falloffExp);
      const target = maxDelay * strength;
      if (target > cellDelay[y * COLS + x])
        cellDelay[y * COLS + x] = target;
    }
  }
}

// ── Camera ────────────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', startCamera);

async function startCamera() {
  const btn = document.getElementById('startBtn');
  btn.textContent = 'CONNECTING...';
  btn.disabled = true;

  if (!navigator.mediaDevices?.getUserMedia) {
    showErr('Camera API unavailable. Serve this file via localhost or HTTPS.');
    btn.textContent = 'ENABLE CAMERA'; btn.disabled = false; return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play().then(() => {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('statusDot').classList.add('live');
        document.getElementById('statusText').textContent = 'LIVE';
        lastDecayTime = performance.now();
        running = true;
        startWarmup();
        requestAnimationFrame(loop);
      }).catch(e => {
        showErr('Play failed: ' + e.message);
        btn.textContent = 'ENABLE CAMERA'; btn.disabled = false;
      });
    };
  } catch(e) {
    let m = 'Camera error: ' + e.message;
    if (e.name === 'NotAllowedError') m = 'Permission denied — click the camera icon in your address bar.';
    else if (e.name === 'NotFoundError') m = 'No camera found.';
    else if (e.name === 'NotReadableError') m = 'Camera in use by another app.';
    showErr(m);
    btn.textContent = 'ENABLE CAMERA'; btn.disabled = false;
  }
}

function showErr(msg) {
  let el = document.getElementById('err-msg');
  if (!el) {
    el = document.createElement('div');
    el.id = 'err-msg';
    el.style.cssText = 'color:#ff2d55;font-size:11px;letter-spacing:1px;max-width:380px;text-align:center;line-height:1.7;margin-top:8px;padding:12px 16px;border:1px solid #3a0010;background:rgba(255,45,85,0.05);';
    document.getElementById('start-screen').appendChild(el);
  }
  el.textContent = msg;
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(now) {
  if (!running) return;
  requestAnimationFrame(loop);

  if (!frozen) {
    if (now - lastCapture >= FRAME_MS) { capture(now); lastCapture = now; }

    const dt = (now - lastDecayTime) / 1000;
    const dec = maxDelay * dt / decaySpeed;
    for (let i = 0; i < cellDelay.length; i++)
      if (cellDelay[i] > 0) cellDelay[i] = Math.max(0, cellDelay[i] - dec);
  }
  lastDecayTime = now;

  if (!warmupDone) tickWarmup(now);

  render(now);
}

function capture(now) {
  capCtx.save();
  capCtx.scale(-1, 1);
  capCtx.drawImage(video, -COLS, 0, COLS, ROWS);
  capCtx.restore();
  const id = capCtx.getImageData(0, 0, COLS, ROWS);

  frameHead = (frameHead + 1) % MAX_FRAMES;
  if (!frameBuffer[frameHead])
    frameBuffer[frameHead] = { time: 0, data: new Uint8ClampedArray(COLS * ROWS * 4) };
  frameBuffer[frameHead].time = now;
  frameBuffer[frameHead].data.set(id.data);
  if (frameCount < MAX_FRAMES) frameCount++;
}

function render(now) {
  if (frameCount === 0) return;

  const cw = canvas.width, ch = canvas.height;
  const cellW = cw / COLS, cellH = ch / ROWS;

  if (!outData || outData.width !== COLS || outData.height !== ROWS)
    outData = cellCtx.createImageData(COLS, ROWS);

  const out = outData.data;

  for (let cy = 0; cy < ROWS; cy++) {
    for (let cx = 0; cx < COLS; cx++) {
      let back = Math.min(Math.round(cellDelay[cy * COLS + cx] / FRAME_MS), frameCount - 1);
      let idx  = (frameHead - back + MAX_FRAMES) % MAX_FRAMES;
      if (!frameBuffer[idx]) idx = frameHead;
      const px  = (cy * COLS + cx) * 4;
      const src = frameBuffer[idx].data;
      out[px]   = src[px];
      out[px+1] = src[px+1];
      out[px+2] = src[px+2];
      out[px+3] = 255;
    }
  }

  cellCtx.putImageData(outData, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(cellCvs, 0, 0, cw, ch);

  // Grid lines
  ctx.strokeStyle = 'rgba(0,0,0,0.38)';
  ctx.lineWidth   = 0.5;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i*cellW, 0); ctx.lineTo(i*cellW, ch); ctx.stroke();
  }
  for (let j = 0; j <= ROWS; j++) {
    ctx.beginPath(); ctx.moveTo(0, j*cellH); ctx.lineTo(cw, j*cellH); ctx.stroke();
  }

  // Tint overlay — only when ON
  if (rainbowOn) {
    for (let cy = 0; cy < ROWS; cy++) {
      for (let cx = 0; cx < COLS; cx++) {
        const d = cellDelay[cy * COLS + cx];
        if (d > 10) {
          const t = d / maxDelay;
          const h = (1 - t) * 140;
          ctx.fillStyle   = `hsla(${h},100%,55%,${0.08 + t * 0.2})`;
          ctx.fillRect(cx*cellW, cy*cellH, cellW, cellH);
          if (t > 0.08) {
            ctx.strokeStyle = `hsla(${h},100%,65%,${t * 0.4})`;
            ctx.lineWidth   = 1;
            ctx.strokeRect(cx*cellW+0.5, cy*cellH+0.5, cellW-1, cellH-1);
          }
        }
      }
    }
  }

  // Hover brush preview
  if (mouseX >= 0 && mouseX < COLS && mouseY >= 0 && mouseY < ROWS) {
    const r = brushSize - 1;
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        const bx = mouseX+dx, by = mouseY+dy;
        if (bx < 0 || bx >= COLS || by < 0 || by >= ROWS) continue;
        const dist = r === 0 ? 0 : Math.sqrt(dx*dx + dy*dy) / r;
        if (dist > 1) continue;
        const strength = r === 0 ? 1 : Math.pow(Math.cos(dist * Math.PI * 0.5), falloffExp);
        if (rainbowOn) {
          ctx.fillStyle   = `rgba(0,255,157,${0.03 + strength * 0.12})`;
          ctx.strokeStyle = `rgba(0,255,157,${strength * 0.35})`;
        } else {
          ctx.fillStyle   = `rgba(255,255,255,${strength * 0.04})`;
          ctx.strokeStyle = `rgba(255,255,255,${strength * 0.08})`;
        }
        ctx.lineWidth = 1;
        ctx.fillRect(bx*cellW, by*cellH, cellW, cellH);
        ctx.strokeRect(bx*cellW+0.5, by*cellH+0.5, cellW-1, cellH-1);
      }
    }
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
rebuildGrid();
</script>
